<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hippo app icon with dark app-canvas baked in. Source for every
       rasterised home-screen icon. Companion to hippo-mark.svg (which is
       transparent for inline use inside the app). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1420"/>
      <stop offset="1" stop-color="#060D13"/>
    </linearGradient>
    <linearGradient id="mark" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="220" gradientUnits="userSpaceOnUse">
