    <path d="M12 28C12 18 20 10 32 10C44 10 52 18 52 28V35C55 35 59 39 59 44C59 49 55 52 52 52V54C52 62 44 64 32 64C20 64 12 62 12 54V52C9 52 5 49 5 44C5 39 9 35 12 35Z" fill="url(#mark)"/>
    <ellipse cx="24" cy="31" rx="4" ry="4.5" fill="#0B1120"/>
    <ellipse cx="40" cy="31" rx="4" ry="4.5" fill="#0B1120"/>
